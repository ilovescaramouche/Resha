<!DOCTYPE html>
<html>
<head>
  <title>Q4 Araling Panlipunan</title>
  <style>
    body {
      background-image: url('ap_pic2.jpg'); 
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .button-container {
      position: absolute;
      bottom: 40px; 
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(3, auto); 
      gap: 15px 25px; 
      text-align: center;
    }

    button {
      padding: 12px 28px;
      border: none;
      border-radius: 10px;
      background-color: lightgreen;
      color: green;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #8BB7E0;
    }

    a {
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="button-container">
    <a href="https://aralin-1-pk.my.canva.site/" target="_blank"><button>Aralin #1</button></a>
